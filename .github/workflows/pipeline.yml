name: Rumee Data Pipeline

on:
  schedule:
    # Runs daily at 1:30 AM IST (8:00 PM UTC previous day)
    - cron: '0 20 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit and push updated CSVs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python process.py --source drive

      - name: Commit updated DB files
        run: |
          git config user.name "Rumee Pipeline"
          git config user.email "rumeein@gmail.com"
          git add rumee_db_summary.csv rumee_db_daily.csv rumee_db_keywords.csv rumee_db_alltime.csv pipeline_log.txt
          git diff --cached --quiet || git commit -m "auto: pipeline run $(date -u +%Y-%m-%d)"

      - name: Push to main
        run: git push origin main
