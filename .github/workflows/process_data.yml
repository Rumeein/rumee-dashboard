name: Rumee Data Pipeline

on:
  # schedule DISABLED 2026-07-03 — product_master rebuild (Option A) in
  # progress. Must stay off until pm_rebuild.yml has run and the catalog/FK
  # files are re-uploaded to rebuild product_master into label folders.
  # Re-enable by uncommenting below once go-live steps 3-4 are done.
  # schedule:
  #   - cron: '0 13 * * *'   # 13:00 UTC = 6:30 PM IST daily (primary)
  #   - cron: '0 14 * * *'   # 14:00 UTC = 7:30 PM IST daily (fallback 1)
  #   - cron: '0 15 * * *'   # 15:00 UTC = 8:30 PM IST daily (fallback 2)
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'Full reset and rebuild (--reset-db)'
        type: boolean
        default: false
      reset_returns:
        description: 'Surgical FK-returns backfill only (--reset-returns)'
        type: boolean
        default: false
      reset_catalog:
        description: 'Surgical Meesho-catalog + FK-listings backfill (--reset-catalog)'
        type: boolean
        default: false
      reprocess_me_ads:
        description: 'Surgical Meesho-ads backfill — re-process all ad files (--reprocess-me-ads)'
        type: boolean
        default: false
      generate_alltime:
        description: 'Generate all-time data file'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run — process files but do NOT save DB or push any changes'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout dashboard repo ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Clone rumee-data private repo ────────────────────────────────────
      - name: Clone rumee-data
        run: |
          git clone https://x-access-token:${{ secrets.RUMEE_DATA_TOKEN }}@github.com/Rumeein/rumee-data.git /tmp/rumee-data

      # ── 3. Migrate existing CSVs on first run ────────────────────────────────
      # Copies CSVs from rumee-dashboard into rumee-data if they don't exist there yet.
      # No-op on subsequent runs once rumee-data has its own data.
      - name: Migrate existing CSVs (first run only)
        run: |
          for f in rumee_db_summary.csv rumee_db_daily.csv rumee_db_keywords.csv rumee_db_fk_ads.csv rumee_db_me_ads.csv; do
            if [ -f "$f" ] && [ ! -f "/tmp/rumee-data/$f" ]; then
              cp "$f" /tmp/rumee-data/
              echo "Migrated $f to rumee-data"
            fi
          done

      # ── 4. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 5. Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 6. Write credentials.json from secret ────────────────────────────────
      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}' > credentials.json

      # ── 7. Run pipeline ──────────────────────────────────────────────────────
      - name: Run pipeline
        run: |
          ARGS="--source=drive"
          if [ "${{ github.event.inputs.reset_db || 'false' }}" = "true" ]; then
            ARGS="$ARGS --reset-db"
          fi
          if [ "${{ github.event.inputs.reset_returns || 'false' }}" = "true" ]; then
            ARGS="$ARGS --reset-returns"
          fi
          if [ "${{ github.event.inputs.reset_catalog || 'false' }}" = "true" ]; then
            ARGS="$ARGS --reset-catalog"
          fi
          if [ "${{ github.event.inputs.reprocess_me_ads || 'false' }}" = "true" ]; then
            ARGS="$ARGS --reprocess-me-ads"
          fi
          if [ "${{ github.event.inputs.generate_alltime || 'false' }}" = "true" ]; then
            ARGS="$ARGS --generate-alltime"
          fi
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: python process.py $ARGS"
          python process.py $ARGS
        env:
          RUMEE_DATA_DIR: /tmp/rumee-data
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DISCORD_WEBHOOK_URL_PIPELINE: ${{ secrets.DISCORD_WEBHOOK_URL_PIPELINE }}
          AMAZON_LWA_CLIENT_ID: ${{ secrets.AMAZON_LWA_CLIENT_ID }}
          AMAZON_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_LWA_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN: ${{ secrets.AMAZON_REFRESH_TOKEN }}

      # ── 8. Check for all-time data request flag ──────────────────────────────
      - name: Check for all-time data request
        id: check_alltime
        run: |
          if [ -f "request_alltime.flag" ]; then
            echo "alltime_requested=true" >> $GITHUB_OUTPUT
          else
            echo "alltime_requested=false" >> $GITHUB_OUTPUT
          fi

      # ── 9. Generate all-time data (flag-triggered) ───────────────────────────
      - name: Generate all-time data (if requested)
        if: steps.check_alltime.outputs.alltime_requested == 'true'
        run: python process.py --generate-alltime --source=drive
        env:
          RUMEE_DATA_DIR: /tmp/rumee-data
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      # ── 10. Commit and push to rumee-data ────────────────────────────────────
      - name: Commit to rumee-data
        run: |
          cd /tmp/rumee-data
          git config user.name "Rumee Pipeline"
          git config user.email "rumeein@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit to rumee-data"
          else
            if [ "${{ steps.check_alltime.outputs.alltime_requested }}" = "true" ]; then
              git commit -m "All-time data generated + data update: $(date +'%Y-%m-%d %H:%M') UTC"
            else
              git commit -m "Data update: $(date +'%Y-%m-%d %H:%M') UTC"
            fi
            # Rebase onto any concurrent push (cron + manual dispatch can overlap) before pushing.
            git pull --rebase --autostash || true
            git push
          fi

      # ── 11. Update dashboard repo (index.html + live run/dates logs) ──────────
      - name: Commit dashboard (index.html + pipeline run log)
        run: |
          git config user.name "Rumee Pipeline"
          git config user.email "rumeein@gmail.com"
          git add index.html pipeline_run_log.json pipeline_dates_log.json
          if [ -f "request_alltime.flag" ] && [ "${{ steps.check_alltime.outputs.alltime_requested }}" = "true" ]; then
            git rm --ignore-unmatch request_alltime.flag
          fi
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit"
          else
            git commit -m "Pipeline run: $(date +'%Y-%m-%d %H:%M') UTC"
            # Rebase onto any concurrent push (cron + manual dispatch can overlap) before pushing.
            git pull --rebase --autostash origin main || true
            git push
          fi

      # ── 12. Clean up sensitive files (always runs, even on failure) ──────────
      - name: Clean up sensitive files
        if: always()
        run: rm -f credentials.json processing_summary.json
