name: Rumee Data Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC (≈ 05:30, 11:30, 17:30, 23:30 IST)
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'Full reset and rebuild (--reset-db)'
        type: boolean
        default: false
      generate_alltime:
        description: 'Generate all-time data file'
        type: boolean
        default: false

# Allow the workflow to commit and push database updates
permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation warning

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Write credentials.json from secret ────────────────────────────────
      # Single-quoted ${{ }} prevents double-expansion; the JSON value is
      # already substituted by GitHub Actions before the shell sees it.
      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}' > credentials.json

      # ── 5. Run pipeline ──────────────────────────────────────────────────────
      - name: Run pipeline
        run: |
          ARGS="--source=drive --email"
          if [ "${{ github.event.inputs.reset_db || 'false' }}" = "true" ]; then
            ARGS="$ARGS --reset-db"
          fi
          if [ "${{ github.event.inputs.generate_alltime || 'false' }}" = "true" ]; then
            ARGS="$ARGS --generate-alltime"
          fi
          echo "Running: python process.py $ARGS"
          python process.py $ARGS
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # ── 6. Check for all-time data request flag ──────────────────────────────
      - name: Check for all-time data request
        id: check_alltime
        run: |
          if [ -f "request_alltime.flag" ]; then
            echo "alltime_requested=true" >> $GITHUB_OUTPUT
            echo "All-time data request flag found."
          else
            echo "alltime_requested=false" >> $GITHUB_OUTPUT
            echo "No all-time request flag."
          fi

      # ── 7. Generate all-time data (flag-triggered) ───────────────────────────
      - name: Generate all-time data (if requested)
        if: steps.check_alltime.outputs.alltime_requested == 'true'
        run: python process.py --generate-alltime --source=drive --email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # ── 8. Check for database changes ────────────────────────────────────────
      # Uses `git status --porcelain` so it catches both modified tracked files
      # AND newly-created files (e.g. rumee_db_alltime.csv on first generation).
      - name: Check for database changes
        id: check_changes
        run: |
          STATUS=$(git status --porcelain \
            rumee_db_summary.csv \
            rumee_db_daily.csv \
            rumee_db_keywords.csv \
            rumee_db_v1.csv \
            rumee_db_alltime.csv \
            index.html 2>/dev/null)
          if [ -n "$STATUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Database changes detected — will commit."
            echo "$STATUS"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No database changes detected. Nothing to commit."
          fi

      # ── 9. Commit and push ───────────────────────────────────────────────────
      # Runs when: DB changed (normal run) OR all-time data was generated.
      # Also deletes request_alltime.flag when all-time was processed.
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true' || steps.check_alltime.outputs.alltime_requested == 'true'
        run: |
          git config user.name "Rumee Pipeline"
          git config user.email "rumeein@gmail.com"
          git add \
            rumee_db_summary.csv \
            rumee_db_daily.csv \
            rumee_db_keywords.csv \
            rumee_db_v1.csv \
            index.html
          if [ -f rumee_db_alltime.csv ]; then
            git add rumee_db_alltime.csv
          fi
          if [ "${{ steps.check_alltime.outputs.alltime_requested }}" = "true" ]; then
            git rm --ignore-unmatch request_alltime.flag
            COMMIT_MSG="All-time data generated + data update: $(date +'%Y-%m-%d %H:%M') UTC"
          else
            COMMIT_MSG="Data update: $(date +'%Y-%m-%d %H:%M') UTC"
          fi
          # Only commit if something is actually staged
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "$COMMIT_MSG"
            git push
          fi

      # ── 10. Clean up sensitive files (always runs, even on failure) ──────────
      - name: Clean up sensitive files
        if: always()
        run: rm -f credentials.json processing_summary.json
