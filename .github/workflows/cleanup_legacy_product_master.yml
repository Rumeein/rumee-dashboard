name: Cleanup legacy product_master docs (one-time)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply for real (unchecked = dry run, report only)'
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Run cleanup (dry run by default)
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          if [ "${{ inputs.apply }}" = "true" ]; then
            python cleanup_legacy_product_master.py --apply
          else
            python cleanup_legacy_product_master.py
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: legacy-cleanup-report
          path: legacy_cleanup_report_*.json
