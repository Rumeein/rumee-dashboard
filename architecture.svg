<svg viewBox="0 0 860 740" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>Rumee Full Data Flow — FK, Meesho, Amazon with Timeline</title>
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-amber" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="860" height="740" fill="#0f1117"/>

  <!-- DATA SOURCES -->
  <text x="20" y="22" font-size="9" fill="#4b5563" letter-spacing="1.5" font-weight="700">DATA SOURCES</text>

  <rect x="20" y="32" width="120" height="52" rx="7" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">Flipkart</text>
  <text x="80" y="67" text-anchor="middle" font-size="9" fill="#6b7280">Seller Dashboard</text>
  <text x="80" y="79" text-anchor="middle" font-size="9" fill="#6b7280">XLSX / CSV exports</text>

  <rect x="160" y="32" width="120" height="52" rx="7" fill="#1a1f2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="220" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#8b5cf6">Meesho</text>
  <text x="220" y="67" text-anchor="middle" font-size="9" fill="#6b7280">Supplier Panel</text>
  <text x="220" y="79" text-anchor="middle" font-size="9" fill="#6b7280">XLSX / CSV exports</text>

  <rect x="300" y="32" width="120" height="52" rx="7" fill="#1a1f2e" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="360" y="49" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">Amazon</text>
  <text x="360" y="63" text-anchor="middle" font-size="9" fill="#6b7280">SP-API</text>
  <text x="360" y="75" text-anchor="middle" font-size="9" fill="#ef4444">future — not yet built</text>

  <!-- AutoSync -->
  <rect x="20" y="118" width="260" height="44" rx="7" fill="#1a1f2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">AutoSync Extension</text>
  <text x="150" y="152" text-anchor="middle" font-size="9" fill="#6b7280">downloads exports · uploads to Google Drive</text>

  <line x1="80" y1="84" x2="80" y2="106" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="80" y1="106" x2="150" y2="106" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="220" y1="84" x2="220" y2="106" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="220" y1="106" x2="150" y2="106" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="150" y1="106" x2="150" y2="118" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="360" y1="84" x2="360" y2="106" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="370" y="103" font-size="8" fill="#ef4444">direct API pull</text>

  <!-- Google Drive -->
  <rect x="20" y="188" width="260" height="44" rx="7" fill="#1a1f2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">Google Drive</text>
  <text x="150" y="222" text-anchor="middle" font-size="9" fill="#6b7280">FK_DAILY · ME_DAILY · FK_ADS · FK_RETURNS · FK_ORDERS</text>

  <line x1="150" y1="162" x2="150" y2="188" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- GitHub Actions -->
  <rect x="20" y="262" width="420" height="48" rx="7" fill="#1a1f2e" stroke="#8b5cf6" stroke-width="2"/>
  <text x="230" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#8b5cf6">GitHub Actions — process.py</text>
  <text x="230" y="298" text-anchor="middle" font-size="9" fill="#6b7280">runs daily 6:30 PM IST · downloads Drive files · parses · deduplicates · writes</text>

  <line x1="150" y1="232" x2="150" y2="262" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="360" y1="118" x2="440" y2="118" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="440" y1="118" x2="440" y2="286" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arr-red)"/>

  <!-- STORAGE -->
  <text x="20" y="336" font-size="9" fill="#4b5563" letter-spacing="1.5" font-weight="700">STORAGE</text>

  <line x1="120" y1="310" x2="120" y2="350" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="340" y1="310" x2="340" y2="350" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="52" y="335" font-size="8" fill="#10b981">FK + ME only</text>
  <text x="270" y="335" font-size="8" fill="#f59e0b">FK + ME + Amazon</text>

  <!-- rumee-data -->
  <rect x="20" y="350" width="220" height="110" rx="7" fill="#1a1f2e" stroke="#10b981" stroke-width="1.5"/>
  <text x="130" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#10b981">rumee-data  (private repo)</text>
  <text x="130" y="384" text-anchor="middle" font-size="9" fill="#6b7280">AES-256 encrypted at rest</text>
  <line x1="35" y1="392" x2="225" y2="392" stroke="#2a2d3a" stroke-width="1"/>
  <text x="35" y="406" font-size="9" fill="#6b7280">rumee_db_daily.csv    — full history</text>
  <text x="35" y="420" font-size="9" fill="#6b7280">rumee_db_summary.csv  — full history</text>
  <text x="35" y="434" font-size="9" fill="#6b7280">rumee_db_keywords.csv — full history</text>
  <text x="35" y="450" font-size="9" fill="#10b981">source of truth · archive forever</text>

  <rect x="20" y="468" width="220" height="22" rx="4" fill="#2d1515" stroke="#ef4444" stroke-width="1"/>
  <text x="130" y="483" text-anchor="middle" font-size="9" fill="#ef4444">Amazon data never stored here</text>

  <!-- Firestore -->
  <rect x="260" y="350" width="360" height="170" rx="7" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="440" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">Firestore</text>
  <text x="440" y="384" text-anchor="middle" font-size="9" fill="#6b7280">what the dashboard reads · public API key · no auth</text>
  <line x1="275" y1="392" x2="605" y2="392" stroke="#2a2d3a" stroke-width="1"/>
  <text x="275" y="407" font-size="9" fill="#f59e0b">rumee_db/summary</text>
  <text x="275" y="419" font-size="9" fill="#6b7280">full replace · 120 KB</text>
  <text x="275" y="435" font-size="9" fill="#f59e0b">rumee_fk_daily/YYYY_MM</text>
  <text x="275" y="447" font-size="9" fill="#6b7280">FK · 7 monthly docs · ≤256 KB</text>
  <text x="275" y="463" font-size="9" fill="#f59e0b">rumee_me_daily/YYYY_MM</text>
  <text x="275" y="475" font-size="9" fill="#6b7280">ME · 7 monthly docs · ≤126 KB</text>
  <text x="450" y="407" font-size="9" fill="#f59e0b">rumee_keywords/YYYY_MM</text>
  <text x="450" y="419" font-size="9" fill="#6b7280">monthly · growing</text>
  <text x="450" y="435" font-size="9" fill="#f59e0b">rumee_insights / rumee_tasks</text>
  <text x="450" y="447" font-size="9" fill="#6b7280">append only · never overwritten</text>
  <text x="450" y="463" font-size="9" fill="#ef4444">Amazon data → here ONLY</text>
  <text x="450" y="475" font-size="9" fill="#6b7280">SP-API compliance · no PAT in HTML</text>
  <text x="275" y="491" font-size="9" fill="#f59e0b">rumee_db/alltime</text>
  <text x="275" y="503" font-size="9" fill="#6b7280">on demand · full history snapshot</text>

  <!-- TIMELINE -->
  <text x="20" y="540" font-size="9" fill="#4b5563" letter-spacing="1.5" font-weight="700">DATA TIMELINE</text>
  <rect x="20" y="548" width="820" height="56" rx="7" fill="#161925" stroke="#2a2d3a" stroke-width="1"/>
  <line x1="50" y1="576" x2="820" y2="576" stroke="#2a2d3a" stroke-width="2"/>
  <text x="44" y="572" font-size="9" fill="#6b7280">Past</text>
  <text x="800" y="572" font-size="9" fill="#6b7280">Now</text>
  <rect x="56" y="562" width="260" height="10" rx="3" fill="#10b981" opacity="0.7"/>
  <text x="186" y="558" text-anchor="middle" font-size="8" fill="#10b981">rumee-data — full history (Dec 2025 →)</text>
  <text x="186" y="594" text-anchor="middle" font-size="8" fill="#6b7280">archive · never expires</text>
  <rect x="316" y="562" width="360" height="10" rx="3" fill="#f59e0b" opacity="0.7"/>
  <text x="496" y="558" text-anchor="middle" font-size="8" fill="#f59e0b">Firestore monthly docs — 6-month rolling window</text>
  <text x="496" y="594" text-anchor="middle" font-size="8" fill="#6b7280">7 monthly docs · past months immutable</text>
  <rect x="676" y="560" width="122" height="14" rx="3" fill="#3b82f6" opacity="0.9"/>
  <text x="737" y="558" text-anchor="middle" font-size="8" fill="#3b82f6">current month</text>
  <text x="737" y="594" text-anchor="middle" font-size="8" fill="#6b7280">overwritten daily</text>
  <line x1="56" y1="555" x2="56" y2="585" stroke="#10b981" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="316" y1="555" x2="316" y2="585" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="676" y1="553" x2="676" y2="587" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- READ PATH -->
  <text x="20" y="626" font-size="9" fill="#4b5563" letter-spacing="1.5" font-weight="700">READ PATH — dashboard load</text>
  <rect x="20" y="636" width="150" height="52" rx="7" fill="#1a1f2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="656" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">Dashboard</text>
  <text x="95" y="670" text-anchor="middle" font-size="9" fill="#6b7280">index.html · GitHub Pages</text>
  <text x="95" y="682" text-anchor="middle" font-size="9" fill="#6b7280">public · browser</text>
  <line x1="170" y1="662" x2="220" y2="662" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <rect x="220" y="636" width="200" height="52" rx="7" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="656" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">Firestore REST</text>
  <text x="320" y="670" text-anchor="middle" font-size="9" fill="#6b7280">10 fetches on load</text>
  <text x="320" y="682" text-anchor="middle" font-size="9" fill="#6b7280">public API key · no login</text>
  <line x1="420" y1="662" x2="470" y2="662" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <rect x="470" y="636" width="360" height="52" rx="7" fill="#1a1f2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="650" y="656" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">Renders in browser</text>
  <text x="650" y="670" text-anchor="middle" font-size="9" fill="#6b7280">Overview · FK · ME · Amazon (future) · Keywords · Insights · Tasks</text>
  <text x="650" y="682" text-anchor="middle" font-size="9" fill="#6b7280">last 3 months shown · all-time on demand</text>

  <line x1="440" y1="520" x2="440" y2="636" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-amber)"/>
</svg>
