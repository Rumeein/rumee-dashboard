  <text x="215" y="88" text-anchor="middle" fill="#9ca3af" font-size="10">Seller Panel</text>

  <rect x="290" y="55" width="110" height="44" rx="6" fill="#1a2a1a" stroke="#4ade80" stroke-width="1.5"/>
